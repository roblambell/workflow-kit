name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip test gate (emergency only)'
        required: false
        type: boolean
        default: false

concurrency:
  group: cd-main
  # Main pushes should ship in order. Queue newer runs instead of cancelling the
  # one already publishing, otherwise GitHub surfaces the superseded run as a failure.
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  test:
    name: Test
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_tests) }}
    uses: ./.github/workflows/test.yml

  compile:
    name: Compile smoke test
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_tests) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Build binary
        run: bun run build
      - name: Smoke test — verify binary runs
        run: ./dist/ninthwave version

  gate:
    name: CD Gate
    runs-on: ubuntu-latest
    needs: [test, compile]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.test.result }}" == "failure" || "${{ needs.test.result }}" == "cancelled" ]]; then
            echo "::error::CD failed -- test=${{ needs.test.result }}"
            exit 1
          fi
          if [[ "${{ needs.compile.result }}" == "failure" || "${{ needs.compile.result }}" == "cancelled" ]]; then
            echo "::error::CD failed -- compile=${{ needs.compile.result }}"
            exit 1
          fi
          echo "CD passed -- test=${{ needs.test.result }}, compile=${{ needs.compile.result }}"

  tag:
    name: Create version tag
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - uses: actions/checkout@v4

      - name: Create tag and trigger release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(cat VERSION)
          TAG="v${VERSION}"

          # Bail if tag already exists
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "Tag ${TAG} already exists, skipping"
            exit 0
          fi

          # Create and push tag
          git tag "${TAG}"
          git push origin "${TAG}"

          # Trigger release workflow on the new tag
          # (workflow_dispatch bypasses the GITHUB_TOKEN event limitation)
          gh workflow run release.yml --ref "${TAG}"
          echo "Created tag ${TAG} and triggered release"
