name: Test

on:
  workflow_call:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - uses: arduino/setup-task@v2
        with:
          version: '3.x'

      - name: Run tests
        run: task test
