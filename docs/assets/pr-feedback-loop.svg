<svg xmlns="http://www.w3.org/2000/svg" width="700" height="480" viewBox="0 0 700 480">
  <!-- Background -->
  <rect width="700" height="480" rx="12" fill="#f6f8fa" />

  <!-- GitHub PR chrome -->
  <rect x="20" y="20" width="660" height="440" rx="8" fill="#ffffff" stroke="#d0d7de" stroke-width="1" />

  <!-- PR header -->
  <rect x="20" y="20" width="660" height="64" rx="8" fill="#ffffff" />
  <circle cx="48" cy="52" r="14" fill="#3fb950" />
  <text x="48" y="57" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold">&#x2713;</text>
  <text x="72" y="46" fill="#24292f" font-family="sans-serif" font-size="16" font-weight="bold">feat: Add onboarding checklist</text>
  <text x="72" y="66" fill="#57606a" font-family="sans-serif" font-size="12">#44 opened by todo-worker (H-UO-3)</text>

  <!-- Branch label -->
  <rect x="520" y="34" width="150" height="24" rx="12" fill="#ddf4ff" />
  <text x="595" y="50" text-anchor="middle" fill="#0969da" font-family="monospace" font-size="11">todo/H-UO-3</text>

  <!-- Divider -->
  <line x1="20" y1="84" x2="680" y2="84" stroke="#d0d7de" stroke-width="1" />

  <!-- CI Status bar -->
  <rect x="40" y="96" width="620" height="36" rx="6" fill="#dafbe1" stroke="#3fb950" stroke-width="1" />
  <circle cx="60" cy="114" r="8" fill="#3fb950" />
  <text x="60" y="118" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="10" font-weight="bold">&#x2713;</text>
  <text x="78" y="118" fill="#1a7f37" font-family="sans-serif" font-size="12" font-weight="600">All checks passed</text>
  <text x="640" y="118" text-anchor="end" fill="#57606a" font-family="sans-serif" font-size="11">3 checks</text>

  <!-- Comment 1: Reviewer -->
  <rect x="40" y="148" width="620" height="80" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1" />
  <rect x="40" y="148" width="620" height="28" rx="6" fill="#f6f8fa" />
  <circle cx="60" cy="162" r="10" fill="#6f42c1" />
  <text x="60" y="166" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="10" font-weight="bold">R</text>
  <text x="80" y="166" fill="#24292f" font-family="sans-serif" font-size="12" font-weight="bold">reviewer</text>
  <text x="160" y="166" fill="#57606a" font-family="sans-serif" font-size="11">commented 14 minutes ago</text>
  <text x="60" y="200" fill="#24292f" font-family="sans-serif" font-size="13">Can we add a progress indicator to the checklist? Users</text>
  <text x="60" y="218" fill="#24292f" font-family="sans-serif" font-size="13">should see how many items they've completed out of total.</text>

  <!-- Comment 2: Worker responds -->
  <rect x="40" y="244" width="620" height="100" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1" />
  <rect x="40" y="244" width="620" height="28" rx="6" fill="#ddf4ff" />
  <circle cx="60" cy="258" r="10" fill="#0969da" />
  <text x="60" y="262" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="10" font-weight="bold">W</text>
  <text x="80" y="262" fill="#24292f" font-family="sans-serif" font-size="12" font-weight="bold">todo-worker</text>
  <rect x="162" y="252" width="32" height="16" rx="3" fill="#ddf4ff" stroke="#0969da" stroke-width="0.5" />
  <text x="178" y="263" text-anchor="middle" fill="#0969da" font-family="sans-serif" font-size="9">bot</text>
  <text x="202" y="262" fill="#57606a" font-family="sans-serif" font-size="11">commented 8 minutes ago</text>

  <text x="60" y="294" fill="#24292f" font-family="sans-serif" font-size="13">Added progress bar component showing completed/total items.</text>
  <text x="60" y="312" fill="#24292f" font-family="sans-serif" font-size="13">See commit </text>
  <text x="138" y="312" fill="#0969da" font-family="monospace" font-size="12">a3f8c21</text>
  <text x="206" y="312" fill="#24292f" font-family="sans-serif" font-size="13">. Progress renders as</text>
  <text x="60" y="330" fill="#24292f" font-family="sans-serif" font-size="13">"3 of 5 complete" with a visual bar.</text>

  <!-- Commit pushed indicator -->
  <rect x="40" y="360" width="620" height="32" rx="6" fill="#f6f8fa" />
  <circle cx="60" cy="376" r="6" fill="#0969da" />
  <text x="78" y="380" fill="#57606a" font-family="sans-serif" font-size="12">todo-worker pushed 1 commit: </text>
  <text x="308" y="380" fill="#0969da" font-family="monospace" font-size="11">fix: add progress indicator to checklist</text>

  <!-- Merge button area -->
  <rect x="40" y="408" width="620" height="40" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1" />
  <rect x="480" y="414" width="160" height="28" rx="6" fill="#2da44e" />
  <text x="560" y="432" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="13" font-weight="bold">Merge pull request</text>
  <text x="60" y="432" fill="#1a7f37" font-family="sans-serif" font-size="12">This branch has no conflicts with the base branch</text>

  <!-- REPLACE label -->
  <rect x="175" y="452" width="350" height="24" rx="6" fill="#f1f5f9" stroke="#d0d7de" stroke-width="1" />
  <text x="350" y="468" text-anchor="middle" fill="#57606a" font-family="sans-serif" font-size="11">REPLACE: Screenshot of actual PR with worker feedback</text>
</svg>
